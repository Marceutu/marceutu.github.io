<style>
:root{
    --azul-institucional:#1A365D;
    --gris-oxford:#4A5568;
    --blanco-fondo:#F7FAFC;
}

html,body{
    height:100%;
    margin:0;
}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--blanco-fondo);
    color:#2D3748;
    display:flex;
    flex-direction:column;
}

.main-content{
    flex:1;
}

/* NAVBAR */
.navbar{
    background:#fff;
    padding:15px 0;
    display:flex;
    justify-content:center;
    border-bottom:3px solid var(--azul-institucional);
    box-shadow:0 2px 4px rgba(0,0,0,.05);
}

.navbar ul{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    gap:40px;
}

.navbar a{
    text-decoration:none;
    color:var(--gris-oxford);
    font-weight:600;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:1px;
    transition:.3s;
}

.navbar a:hover{
    color:var(--azul-institucional);
}

/* CONTENEDOR */
.centrado{
    max-width:1100px;
    margin:auto;
    padding:50px 20px;
}

h2{
    font-family:'Playfair Display',serif;
    color:var(--azul-institucional);
    text-align:center;
    font-size:36px;
    margin-bottom:40px;
}

/* COLUMNAS */
.columnas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.columna{
    background:#fff;
    border-top:5px solid var(--azul-institucional);
    border-radius:8px;
    padding:30px;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.columna h4{
    margin-top:0;
    color:var(--azul-institucional);
    border-bottom:1px solid #edf2f7;
    padding-bottom:12px;
}

/* BOTONES */
.btn-link{
    display:block;
    text-decoration:none;
    background:#edf2f7;
    color:var(--azul-institucional);
    padding:12px;
    margin-bottom:12px;
    border-radius:6px;
    text-align:center;
    font-weight:600;
    transition:0.3s;
}

.btn-link:hover{
    background:var(--azul-institucional);
    color:#fff;
    transform:translateY(-2px);
}

/* MENSAJE */
.status-msg{
    font-size:14px;
    color:var(--gris-oxford);
    font-style:italic;
    background:#f8fafc;
    padding:10px;
    border-radius:4px;
    text-align:center;
    border:1px dashed #e2e8f0;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    background:var(--azul-institucional);
    color:#fff;
}

@media(max-width:600px){
    .navbar ul{gap:20px;}
    .navbar a{font-size:11px;}
}
</style>
</head>
